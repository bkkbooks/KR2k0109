body:
  text: 益部方物略記地理類八雜記之屬提要臣等謹案益部方物略記一卷宋宋祁撰祁字子京雍邱人天聖二年進士官至翰林學士承㫖諡景文事迹具宋史本𫝊是編乃嘉祐二年祁由端明殿學士吏部侍郎知益州時所作因東陽沈立所撰劍南方物二十八種補其缺遺凡草朩之屬四十一藥之屬九鳥獸之屬八蟲魚之屬七共六十五種列而圖之各繫以贊而附注其形狀於題下贊居前題列後古書體例大抵如斯今本爾雅猶此式也其圖已佚贊皆古雅蓋力摹郭璞山海經圖贊往往近之注則頗傷蹇澀亦每似所作新唐書蓋祁序記之文類如是也胡震亨跋引范成大聖瑞花詩證是花開於春夏間祁注稱悉以秋開為非殆由氣候不齊各據所見又引薛濤鴛鴦草詩但娛春日長不管秋風早句證祁注是草春葉晚生之非則橫生枝節夫春日已長非春晚而何歟至虞美人草自屬借人以名物如菊號西施之類必改為娛美人草曲生訓釋是則支離無所取耳乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書益部方物略記序益為西南一都會左阻劍門右負夷蕃內坦夷數百里環以長江裹以復岑川陸盛氣礙而不得東回薄蜿蜒還負一方為珍木為怪草為鳥魚芋稻之饒日𤾉雨雨噓和吐妍層出雜見不可勝狀殆岷精緼靈示闕璚於兹壤也嘉祐建元之明年豫來領州得東陽沈立所録劍南陽物二十八種按名索實尚未之盡故遍詢西人又益數十物列而圖之物為之贊圖視狀贊言生之所以然更名益部方物略記凡東方所無及有而自異皆取之冀裨風土聚邱之遺云欽定四庫全書益部方物略記宋宋祁撰棕皆褫皮此獨自幹攢葉于顛纛首披散秋華而實其值則罕右海棕大抵棕類然不皮而幹葉叢于杪至秋乃實似楝子今城中有四株杜子美左綿海棕行理緻幹堅風雨不能撼云在土所宜亭擢而上枝枝相避葉葉相讓如向切繁陰可庇美幹斯仰右楠蜀地最宜者生童童若幢蓋然枝葉不相礙茂葉美隂人多植之樹甚端偉葉經歲不雕至春陳新相換有花實似母丁香云厥植易安數歲輒林民賴其用實代其薪不棟不梁亦被斧斤右榿亦得所宜民家蒔之不三年材可倍常人多薪之疾種亟取里人以為利杜子美有覔榿栽詩葉與竹類緻理如柏以狀得名亭亭修直右竹柏生峨眉山中葉繁長而籜似竹然其幹大抵類柏而亭直木幹芋葉擁踵盤戾農經弗載不用治厲右海芋生不髙四五尺葉似芋而有幹根皮不可食方家號隔河仙云可用變金或云能止瘧葉圓以澤素花春敷子生莢間纍纍綴珠右紅豆花白色實若大紅豆以似得名葉如冬青蜀人以為果飣竹生三歲色乃變紫伐幹以用西南之美右紫竹蜀諸山中尤多園池亦種為玩然生二年色乃變三年而紫根不它引是得慈名中實外堅筍不時萌末或下垂苒弱緣縈右慈竹性叢産根不外引其密間不容笴筍生夏秋閲歲枝葉乃茂别有數種節間容八九寸者曰籠竹一尺者曰苦竹弱稍垂地者曰釣絲竹或取節修膚緻者用為簟笠葉棕身竹族生不蔓有皮無枝實中而幹右棕竹性亦叢産葉似棕有刺徑不三二寸或曰桃竹未得其詳竹箇皆圓此獨方形厚倍於竅緗節稜稜右方竹圓衆方寡取貴方者差小碧葉素葩厥包之珍丹裏既披香液飴津右柑生果渠嘉等州結實埒於江南味亦差為薄云芋種不一鸇芋則貴民儲於田可用終歲右赤鸇芋蜀芋多種鸇芋為最美俗號赤鸇頭芋形長而圓但子不繁衍又有蠻芋亦美其形則圓子繁衍人多蒔之最下為槫果芋槫接也言可接果山中人多食之惟野芋人不食本草有六種曰青芋紫芋白芋真芋蓮禪芋野芋西南所宜柔蔓紛衍縹穗緑實其甘可薦右緑蒲萄北方蒲萄熟則色紫今此色正緑云栗類尤衆此特殊味專蓬若橡託神以貴右天師栗生青城山中他處無有也似栗味美惟獨房為異久食已風攣有子孫枝不花而實薄言采之味埓蜂密右天仙果樹髙八九尺無花其葉似荔枝而小子如櫻桃纍纍綴枝間六七月熟味至甘挺幹既修結花兹白㦸外澤中甘可以食右隈枝生卭州山谷中樹髙丈餘枝修弱花白實似荔枝肉黃膚甘味可食大若爵卵花跗芬侈叢刺於梗不可把玩艷以妍整右錦被堆花出彭州其色一似薔薇有刺不可玩俗謂薔薇為錦被堆花苒苒其條若不自持緑葉丹英蔓衍紛垂右錦帶花蜀山中處處有之長蔓柔纎花葉間側如藻帶然因象作名花開者形似飛鳥里人亦號鬢邊嬌有苕頴然有蕚敷然取其肖象莫類於蟬右石蟬花始生其苕森擢長二三尺葉如菖蒲紫蕚五出與蟬甚類緑闕相側蜀人因名之又白者號玉蟬花色與柏類苒苒其莖冬不甚黃故謂長生右長生草山隂蕨地多有之修莖茸葉色似檜柏而澤經冬不凋損故號長生翠蔓紺苕回繚可喜蒔之庭堂珍以為瑞右瑞草蜀人多種之庭檻蔓延長三四尺珍而愛之故謂之瑞草蕉無中幹花産葉間緑葉外敷絳質凝殷右紅蕉花於芭蕉蓋自一種葉小其花鮮明可喜蜀人語染深紅者謂之蕉紅蓋倣其殷麗云修柯柔蔓濃淺繁總盛則重花不常厥種右重葉海棠海棠大抵數種又峕小異惟其盛者則重葩疊蕚可喜非有定種也始濃稍淺爛若錦章北方所植率枝强花瘠殊不可玩故蜀之海棠誠為天下之竒豔云花亘四時月一披秀寒暑不改似固常守右月季花此花即東方所謂四季花者翠蔓紅花蜀少霜雪此花得終歲十二月輒一開豐粒茂苗豆别一類秋種春斂農不常蒔右佛豆豆粒甚大而堅農夫不甚種唯圃中蒔以為利以鹽漬食之小兒所嗜自濃而淺花則常態今顧反之亦反之怪右添色拒霜花生彭漢蜀州花常多葉始開白色明日稍紅又明日則若桃花然人情尚竒賤白貴黃厥英略同實寡于香右黃荼􅐘蜀荼􅐘多白而黃者時時有之但香减于白花緑實若茰味辛香苾投粒羹臛椒桂之匹右艾子艾木大抵茱茰類也實正緑味辛蜀人每進羹臛以二三粒投之少選香滿盂盞或曰作為膏尤良按揚雄蜀都賦當作藙藙艾同字云翠花對生甚似匹鳥逼而觀之勢若偕矯右鴛鴦草春葉晚生其稚花在葉中兩兩相向如飛鳥對翔附陽而生垂若文縚大槩苔類土石所交右仙人縚生大山中與苔同種但巖隂石隈多鮮翠長二三尺叢垂若縚或言深谷有長丈餘者翠莖纖柔稚葉相當逼而歌之或合或張右娛美人草蜀中傳虞美人草豫以虞作娛意其草柔纖為歌氣所動故其葉至小者或動搖美人以為娛樂耳冒寒而茂莖修葉廣附莖作花葉蔽其上以其自蔽若有羞狀右羞寒花蜀地處處有之不為人所愛根莖綴花蔽葉自隱俗曰羞天花豫易為羞寒花按本草名曰鬼白衆跗聚英爛若一房有守繪圖厥名乃章繁而不艷是異衆芳右瑞聖花出青城山中幹不條髙者乃尋丈花率秋開四出與桃花類然數十跗共為一花繁密若綴先後相繼闕人號豐瑞花故程相闕之闕未萎也蜀圖以聞更號瑞聖花然有數種其小者號寶仙淺紅者為醉太平白者名玉真成都人競移蒔囿中以為尤玩云擢頴挺挺盛夏則榮丹紫合英以寶見名右七寶花條葉大抵玉蟬花類也其生叢蔚花紫質蔚云擢條亭亭層層紫丹狀若使節方圖實刋右旗節花修修華碧皆層層而擢正類使所持節然故以名見益州圖經聚葩共房葉附華外根不得徙見偉兹世右娑羅花生峨眉山中類枇杷數葩合房春開葉在表花在中或言根不可移故俗人不得為玩葩秀木顛狀若芙渠不實而榮馥馥其敷右木蓮花生峨眉山中諸谷狀若芙蓉香亦類之木幹花夏開枝條茂蔚不為園圃所蒔華而無采狀類翔鳳么質毛輕翩欲飛動右鵝毛玉鳳花本至卑纎蓬如叉股秋開不花而鬢狀似禽故曰鳳色白故曰玉以其分輕故曰毛蔓附本生實若椹纍或曰浮留南人謂之和以為醬五味告宜右蒟出渝瀘茂威等州即漢唐䝉所得者葉如王瓜厚而澤實若桑椹緣木而蔓子熟時外黑中白長三四寸以蜜藏而食之辛香能溫五藏或用作醬善和食味或言即南方所謂浮留藤取葉合檳榔食之植根水中端若串珠皿而瀹之可代蔬右真珠菜戎瀘等州有之生水中石上翠縷纎蔓首貫珠蜀人以蜜熬食之或以醯煮可行數千里不腐也素花碧葉浮秀波面日中則向日入還斂右朝日蓮花色或黃或白葉浮水上翠厚而澤形如菱花差大開則隨日所在日入輒斂而自藏於葉下若葵藿傾太陽之比蟬不能蛻委於林下花生厥首兹謂物化右蟬花二川山林中皆有之蟬之不蛻者至秋則花其頭長一二寸黃碧色治小兒瘈瘲又能已瘧葉能螫人有花無實冒冬弗悴可以袪疾右燖麻自劍以南處處有之或觸其葉如蜂螫人以溺濯之即解莖有刺葉似花葉或青或紫善治風腫按杜詩當作􅣪厥生在石水蕩其液觸梗凝體品亞南舶右水硫黃出資榮州山澗中秋潦己收里人布茅水上流沫擁聚取而熬之復投于水則成號真珠黃以淺黃色者為上其用次海舶所來者附堇而生翠莖紫蕤生蜀者良三建則非右附子生綿州彰明縣者最良有一子重及一兩者花色紫本草言附子無正種附烏頭而生然則與烏頭天雄附子共一物耳陶𢎞景以天雄烏頭附子皆出建平謂之三建唐人非之以綿龍二州所生為良今則彰明者佳修幹澤葉結實如綴膚解核零可用治痺右石瓜生峨眉山中樹端挺葉肥滑如冬青甚似桑花色淺黃實長不圓赦解而子見以其形似瓜里人名之煮為液黃善能治痺柔葉美根冬不殞零采而掇之可糝于羮右芎蜀中處處有之葉為蘼蕪楚辭謂江蘺者根為芎似雀腦者善成都九月九日藥市芎與大黃如積香溢于廛或言其大若胡桃者不可用人多蒔於園檻葉落時可用作羮蜀少寒莖葉不萎今醫家最貴川芎川大黃云葉大莖赤根若巨皿治疾則多方家所詺音瞑右大黃蜀大山中多有之尤為東方所貴苖根皆長盈二尺本草言之尤詳藥市所見大者治之為枕紫地錦文唐人以為産蜀者性和厚沉深可以治病形似牛舌緊緻者善蜀所生藥尚多如川之巴豆峽之椒梓之厚朴尚數十輩黃葩翠葉圓實而澤咀久還甘或號菴勒右餘甘子生戎瀘等州山樹大葉細似槐實若李而小咀之前苦後歆歆有味故號為餘甘核有稜或六或七解硫黃毒即本草所謂菴摩勒者長葉叢生背㸃星布髙醫近識𫝊疽可愈右金星草生峨眉青城山葉似萱草其背有㸃雙行相偶黃澤類金星人號金星草亦云金釧草皆以肖似取之今醫家以傅疽創甚良金花之露俗曰鳳類緑羽纖爪藻背翠尾花落則隱以是見貴右桐花鳳二月桐花始開是鳥翺翔其間丹碧成文纎觜長尾仰露以飲至花落輒去蜀人珍之故號為鳳或為人捕置樊間飲以蜜漿哺以炊粟可以閲歲蜀士以繪扇唐李衛公嘗為賦絳質剛啄孱黑于矜因網就羇亦馴厥心右紅桐觜出永康軍山谷中絳體若赭惟羽間差黑人亦畜之然不能久也緇緑厠采喜荏克膒奮頸陪腮矜健於味里人裒資以佐其鬬右荏雀每歲荏且熟是則羣至食其實性好鬬人捕之裒錢使決勝負閭里嘈觀至一雀直數千錢官司惡民贅聚每下符禁叱之茜苜黑裳黃駮其羽厥鳴嚶嚶若禁若護名而不情盜者猶懼右護花鳥青城峨眉間往往有之至春則啼其音若云無偷花果髣佛人言云緑衣紺尾一啼百轉可樊而畜為世嘉玩右百舌鳥出中蜀山谷間毛采翠碧蜀人多畜之一云翠碧鳥善效他禽語凡數十種非東方所謂反舌無聲者往往亦矜鬬至死不解然捕者告罕故惜之不使極其擊云狀實猿類體被金毳皮以藉焉中國之貴右狨威茂等州南詔夷多有之大小正類猿惟毛為異朝制內外省以上官乘馬者得以狨為藉武官則內客省使宣徽使乃得用羊質而大角繚於首以角之珍軀殘獵手右龍羊出吐蕃及威茂州形似畜羊而大其角繚繚重八九兩黑質而白文可以為帶胯其用亂犀玃與猿猱同類異種彼美豐肌登爼見用右玃出卭蜀間與猿猱無異但性不躁動肌質豐腴蜀人炮蒸以為美味有足若鯢大首長尾其啼如嬰緣木弗墜右魶魚出西山溪谷及雅江狀似鯢有足能緣木其聲如兒啼蜀人養之二丙之穴厥産嘉魚鯉質鱒鱗為味珍腴右嘉魚丙穴在興州有大丙小丙山魚出石穴中今雅州亦有之蜀人甚珍其味左思所謂嘉魚出於丙穴中比鯽則大膚縷玉瑩以鱠諸庖無異雋永右􅫀魚出蜀江皆鱗黑而膚理似玉蜀人以為鱠味美黑首白腹修體短額春則羣泳促罟斯獲右黑頭魚形若鯶長者及尺出嘉州歲二月則至惟郭璞臺前有之里人欲怪其說則言璞著書臺魚吞其墨故首黑云長不數寸有駮其文淺瀨曲隈唯泳而羣右沙緑魚魚之細者生隈瀨中狀若鰡大不五寸美味蜀人珍之鯫鱗么質本不登爼以味見録雖細猶捕右石鱉魚狀似􅻚䰲而小上春時出石間庖人取為竒味蟲質甚微翠體金光取而橋之參飾叉梁右金蟲出利州山中蜂體緑色光若金里人取以佐婦叉鐶之飾云益部方物略記益部方物略記跋萬震南州志以韻語紀物質雅可誦後來惟江文通吳興草朩頌僅足嗣響頃復得宋子京益部方物略記凡草朩蟲魚六十五條而寫色奏音一倣于震第見白氏長慶集朩蓮樹詩叙云朩蓮樹一呼黃心樹大者髙五丈涉冬不凋身如青楊有白文葉如桂厚大無脊花如蓮香色豔膩皆同獨房蘂有異視宋注最詳宋又注聖瑞花云率以秋開卯央草云春葉晚生而范成大詠聖瑞花云挽春同住夏看到火雲流薛濤詠卯央草云但娛春日長不管秋風早是春夏便已著花春葉非晚生矣至若改羞天為羞寒猶不失以妍易俚其改虞美人為娛美人則虞之與娛兩義自通得無更遺宵寐匪禎之誚海鹽胡震亨題
